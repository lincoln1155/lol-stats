<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riot Match History</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f1118;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .container {
            max-width: 860px;
            margin: 0 auto;
            padding: 60px 20px 40px;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #6b7280;
            font-size: 0.85rem;
            margin-bottom: 32px;
        }

        /* ── Search bar ── */
        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 36px;
        }

        .search-bar select {
            background: #1a1d28;
            border: 1px solid #2a2d3a;
            color: #e0e0e0;
            padding: 12px 14px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-bar select:focus {
            border-color: #4f6ef7;
        }

        .search-bar input {
            flex: 1;
            background: #1a1d28;
            border: 1px solid #2a2d3a;
            color: #e0e0e0;
            padding: 12px 16px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-bar input::placeholder {
            color: #4b5060;
        }

        .search-bar input:focus {
            border-color: #4f6ef7;
        }

        .search-bar button {
            background: #4f6ef7;
            color: #fff;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .search-bar button:hover {
            background: #3d5bd9;
        }

        .search-bar button:disabled {
            background: #2a2d3a;
            color: #555;
            cursor: not-allowed;
        }

        /* ── Status messages ── */
        .status {
            text-align: center;
            padding: 40px 0;
            color: #6b7280;
            font-size: 0.85rem;
        }

        .status.error {
            color: #ef4444;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #2a2d3a;
            border-top-color: #4f6ef7;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ── Results header ── */
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 16px;
        }

        .results-header h2 {
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
        }

        .results-header span {
            font-size: 0.8rem;
            color: #6b7280;
        }

        .source-badge {
            display: inline-block;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 4px;
            background: #1e2330;
            color: #6b7280;
            margin-left: 8px;
        }

        /* ── Match cards ── */
        .match-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .match-card {
            display: grid;
            grid-template-columns: 6px 1fr;
            background: #161821;
            border: 1px solid #1e2130;
            border-radius: 8px;
            overflow: hidden;
            transition: border-color 0.15s;
        }

        .match-card:hover {
            border-color: #2a2d3a;
        }

        .match-indicator {
            width: 6px;
        }

        .match-card.win .match-indicator {
            background: #22c55e;
        }

        .match-card.loss .match-indicator {
            background: #ef4444;
        }

        .match-content {
            display: grid;
            grid-template-columns: 140px 1fr auto;
            align-items: center;
            padding: 14px 20px;
            gap: 20px;
        }

        .match-champ {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .match-champ .champ-name {
            font-weight: 600;
            font-size: 0.9rem;
            color: #fff;
        }

        .match-champ .role {
            font-size: 0.75rem;
            color: #6b7280;
            text-transform: capitalize;
        }

        .match-stats {
            display: flex;
            gap: 24px;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .stat .value {
            font-weight: 600;
            font-size: 0.9rem;
            color: #e0e0e0;
        }

        .stat .label {
            font-size: 0.65rem;
            color: #4b5060;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .match-result {
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 4px 12px;
            border-radius: 4px;
        }

        .match-card.win .match-result {
            color: #22c55e;
            background: rgba(34, 197, 94, 0.1);
        }

        .match-card.loss .match-result {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .match-content {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .match-stats {
                flex-wrap: wrap;
                gap: 16px;
            }

            .search-bar {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Match History</h1>
        <p class="subtitle">Search a player's recent League of Legends matches</p>

        <div class="search-bar">
            <select id="region">
                <option value="americas">Americas</option>
                <option value="europe">Europe</option>
                <option value="asia">Asia</option>
                <option value="sea">SEA</option>
            </select>
            <input
                type="text"
                id="riot-id"
                placeholder="Player#TAG"
                autocomplete="off"
            />
            <button id="search-btn" onclick="searchMatches()">Search</button>
        </div>

        <div id="results"></div>
    </div>

    <script>
        const input = document.getElementById('riot-id');
        const btn = document.getElementById('search-btn');
        const resultsDiv = document.getElementById('results');

        // Allow pressing Enter to search
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') searchMatches();
        });

        async function searchMatches() {
            const raw = input.value.trim();
            if (!raw) return;

            // Convert Player#TAG → Player-TAG for the API
            const riotId = raw.replace('#', '-');
            const region = document.getElementById('region').value;

            btn.disabled = true;
            resultsDiv.innerHTML = `
                <div class="status">
                    <div class="spinner"></div>
                    <div>Fetching matches for <strong>${escapeHtml(raw)}</strong>…</div>
                </div>`;

            try {
                const res = await fetch(`/matches/${region}/${encodeURIComponent(riotId)}`);

                if (!res.ok) {
                    const err = await res.json().catch(() => null);
                    throw new Error(err?.detail || `Error ${res.status}`);
                }

                const json = await res.json();
                renderMatches(json);
            } catch (err) {
                resultsDiv.innerHTML = `<div class="status error">${escapeHtml(err.message)}</div>`;
            } finally {
                btn.disabled = false;
            }
        }

        function renderMatches({ source, data }) {
            if (!data || data.length === 0) {
                resultsDiv.innerHTML = '<div class="status">No matches found.</div>';
                return;
            }

            const header = `
                <div class="results-header">
                    <h2>Last ${data.length} Matches</h2>
                    <span>source: ${escapeHtml(source)}</span>
                </div>`;

            const cards = data.map((m) => {
                if (!m) return '';
                const outcome = m.win ? 'win' : 'loss';
                const gold = (m.gold / 1000).toFixed(1) + 'k';

                return `
                <div class="match-card ${outcome}">
                    <div class="match-indicator"></div>
                    <div class="match-content">
                        <div class="match-champ">
                            <span class="champ-name">${escapeHtml(m.champion)}</span>
                            <span class="role">${formatRole(m.role)}</span>
                        </div>
                        <div class="match-stats">
                            <div class="stat">
                                <span class="value">${escapeHtml(m.kda)}</span>
                                <span class="label">KDA</span>
                            </div>
                            <div class="stat">
                                <span class="value">${m.cs}</span>
                                <span class="label">CS</span>
                            </div>
                            <div class="stat">
                                <span class="value">${gold}</span>
                                <span class="label">Gold</span>
                            </div>
                        </div>
                        <div class="match-result">${outcome}</div>
                    </div>
                </div>`;
            }).join('');

            resultsDiv.innerHTML = header + '<div class="match-list">' + cards + '</div>';
        }

        function formatRole(role) {
            const roles = {
                'TOP': 'Top',
                'JUNGLE': 'Jungle',
                'MIDDLE': 'Mid',
                'BOTTOM': 'Bot',
                'UTILITY': 'Support',
                'Invalid': 'Fill'
            };
            return roles[role] || role;
        }

        function escapeHtml(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }
    </script>
</body>
</html>
